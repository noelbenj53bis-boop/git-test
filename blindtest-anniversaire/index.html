<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blind Test Gaming — Rejoindre</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(204,255,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(204,255,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo { text-align: center; }

    .logo-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 16px #CCFF00);
    }

    .logo-title {
      font-size: clamp(2rem, 9vw, 3rem);
      text-transform: uppercase;
      color: #CCFF00;
      text-shadow: 0 0 20px #CCFF00, 0 0 40px rgba(204,255,0,0.4);
      letter-spacing: 5px;
      line-height: 1;
    }

    .logo-sub {
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .card {
      background: #111;
      border: 2px solid #CCFF00;
      border-radius: 16px;
      padding: 36px 28px 28px;
      width: 100%;
      box-shadow: 0 0 40px rgba(204,255,0,0.12), inset 0 0 60px rgba(204,255,0,0.02);
    }

    .field-label {
      display: block;
      color: #CCFF00;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    input#pseudo {
      width: 100%;
      background: #1c1c1c;
      border: 2px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 1.7rem;
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      padding: 16px 18px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 3px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: #CCFF00;
    }

    input#pseudo:focus {
      border-color: #CCFF00;
      box-shadow: 0 0 24px rgba(204,255,0,0.25);
    }

    input#pseudo::placeholder { color: #3a3a3a; }

    .char-row {
      display: flex;
      justify-content: flex-end;
      font-family: Arial, sans-serif;
      font-size: 0.72rem;
      color: #555;
      margin-top: 6px;
      margin-bottom: 22px;
    }

    #joinBtn {
      width: 100%;
      background: #CCFF00;
      color: #111;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 4px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 0 28px rgba(204,255,0,0.45);
    }

    #joinBtn:hover:not(:disabled) {
      background: #fff;
      box-shadow: 0 0 48px rgba(204,255,0,0.8), 0 4px 16px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }

    #joinBtn:active:not(:disabled) { transform: scale(0.97); }

    #joinBtn:disabled {
      background: #2a2a2a;
      color: #555;
      box-shadow: none;
      cursor: not-allowed;
    }

    .error-msg {
      color: #ff4444;
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      margin-top: 14px;
      text-align: center;
      min-height: 20px;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(17,17,17,0.3);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-hint {
      font-family: Arial, sans-serif;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="logo-icon">🎮</span>
      <div class="logo-title">BLIND TEST</div>
      <div class="logo-sub">Soirée Gaming</div>
    </div>

    <div class="card">
      <label class="field-label" for="pseudo">Choisis ton pseudo</label>
      <input
        type="text"
        id="pseudo"
        placeholder="PSEUDO"
        maxlength="16"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
      >
      <div class="char-row"><span id="charCount">0</span>/16</div>
      <button id="joinBtn" onclick="joinGame()">Rejoindre la partie</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="footer-hint">Saisis ton pseudo, puis rejoins la partie !</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDjMGInt3PNL7SNlfFG_-cjahJW66_i1A",
      authDomain: "blindtest-anniversaire.firebaseapp.com",
      databaseURL: "https://blindtest-anniversaire-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "blindtest-anniversaire",
      storageBucket: "blindtest-anniversaire.firebasestorage.app",
      messagingSenderId: "164642303775",
      appId: "1:164642303775:web:ba51b309d28675fb8f8a2a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Generate or reuse a stable player ID
    let playerId = localStorage.getItem('bt_playerId');
    if (!playerId) {
      playerId = 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      localStorage.setItem('bt_playerId', playerId);
    }

    const pseudoInput = document.getElementById('pseudo');

    pseudoInput.addEventListener('input', () => {
      document.getElementById('charCount').textContent = pseudoInput.value.length;
    });

    pseudoInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinGame();
    });

    async function joinGame() {
      const pseudo = pseudoInput.value.trim().toUpperCase().replace(/\s+/g, '_');
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('joinBtn');

      errorMsg.textContent = '';
      if (pseudo.length < 2) {
        errorMsg.textContent = 'Pseudo trop court (2 caractères minimum)';
        pseudoInput.focus();
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        await db.ref('players/' + playerId).set({
          name: pseudo,
          score: 0,
          joinedAt: firebase.database.ServerValue.TIMESTAMP
        });
        localStorage.setItem('bt_playerName', pseudo);
        window.location.href = 'player.html';
      } catch (err) {
        errorMsg.textContent = 'Erreur de connexion — vérifie ta connexion internet.';
        btn.disabled = false;
        btn.textContent = 'Rejoindre la partie';
        console.error(err);
      }
    }

    pseudoInput.focus();
  </script>
</body>
</html>
